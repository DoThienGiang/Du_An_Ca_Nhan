<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tạo layout với table</title>
    <!-- <link rel="stylesheet" href="./assets/css/style.css" /> -->
  </head>
  <body>
    <h2>Quantrimang.com</h2>
    <p>Click vào máy tính, điện thoại hoặc cốc cà phê trong ảnh để đi đến trang mới và đọc nhiều hơn về topic:</p>

    <img
      src="https://img.quantrimang.com/photos/image/2018/05/25/workplace.jpg"
      alt="Workplace"
      usemap="#workmap"
      width="400"
      height="379"
    />

    <map name="workmap">
      <area
        shape="rect"
        coords="34,44,270,350"
        alt="Computer"
        href="https://st.quantrimang.com/photos/image/2024/05/15/mua-apple-pencil-nao-cho-ipad-size-696x364-znd.jpg"
      />
      <area shape="rect" coords="290,172,333,250" alt="Phone" href="https://quantrimang.com/ios" />
      <area shape="circle" coords="337,300,44" alt="Cup of coffee" href="https://quantrimang.com/cuoc-song" />
    </map>
  </body>
</html>
