<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="/assets/css/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/b1737a6c4f.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class ="container h-100">
        <div class ="row h-100 justify-content-center align-items-center " >
            <form action ="" class ="col-md-9">
                <div class ="appForm shadow-lg">
                    <div class ="row" >
                        <div class ="col-md-6 d-flex justify-content-center align-items-center" >
                            <div class ="appFormLeft" >
                                <h1>Login</h1>
                                <div class ="form-group position-relative mb-4">
                                    <input type="text" class ="form-control border-top-0 border-right-0 border-left-0 rounded-0 shadow-none" 
                                    id ="username" placeholder ="Username">
                                    <i class ="fa-solid fa-user"></i>
                                </div>  
                                <div class ="form-group position-relative mb-4">
                                    <input type ="password" class ="form-control border-top-0 border-right-0 border-left-0 rounded-0 
                                    shadow-none" id ="password" placeholder ="Password">
                                    <i class ="fa-solid fa-key"></i>
                                </div>
                                <div class="row mt-4 mb-4">
                                    <div class="col-md-6">
                                        <div class="form-check">
                                            <input type="checkbox" id="defaultCheck" class="form-check-input">
                                            <label for="" class="form-check-label">Remember me</label>
                                        </div>
                                    </div>
                                    <div class="col-md-6 text-right">
                                        <a href="#">Forget Password</a>
                                    </div>
                                </div>
                                <button class="btn btn-success btn-block shadow border-0 py-2 text-uppercase">LOGIN</button>
                                <p class="text-center mt-5">Don't have a account ?
                                    <span>Create your account</span>
                                </p>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="appFormRight position-relative d-flex justify-content-center flex-column align-items-center text-center p-5 text-white">
                                <h2 class="position-relative px-4 pb-3 mb-4">Wellcome</h2>
                                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Eos vitae dicta delectus voluptatum 
                                    aliquid quasi amet nihil nesciunt temporibus voluptates.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div> 
</body>
</html>
